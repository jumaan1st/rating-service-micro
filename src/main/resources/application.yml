spring:
  application:
    name: rating-service
  mongodb:
    uri: mongodb://localhost:27017/
    database: microservices

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true

  instance:
    prefer-ip-address: true

server:
  port: 8081